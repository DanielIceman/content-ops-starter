<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Arctic landscape background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="300" fill="url(#skyGradient)"/>
  
  <!-- Mountains -->
  <path d="M0 300L150 150L300 200L450 100L600 180L750 120L800 160V300Z" fill="url(#mountainGradient)"/>
  
  <!-- Ground -->
  <rect y="300" width="800" height="200" fill="#f1f5f9"/>
  
  <!-- Professional figures -->
  <g transform="translate(100, 320)">
    <!-- Person 1 -->
    <circle cx="50" cy="40" r="20" fill="#0369a1"/>
    <rect x="40" y="60" width="20" height="60" rx="10" fill="#1e40af"/>
    <rect x="45" y="75" width="10" height="30" fill="#ffffff"/>
  </g>
  
  <g transform="translate(250, 310)">
    <!-- Person 2 -->
    <circle cx="50" cy="40" r="20" fill="#0369a1"/>
    <rect x="40" y="60" width="20" height="70" rx="10" fill="#1e40af"/>
    <rect x="45" y="75" width="10" height="35" fill="#ffffff"/>
  </g>
  
  <g transform="translate(400, 325)">
    <!-- Person 3 -->
    <circle cx="50" cy="40" r="20" fill="#0369a1"/>
    <rect x="40" y="60" width="20" height="55" rx="10" fill="#1e40af"/>
    <rect x="45" y="75" width="10" height="25" fill="#ffffff"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M150 360L300 350L450 365" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Text overlay -->
  <text x="550" y="200" font-family="sans-serif" font-size="36" font-weight="bold" fill="#0f172a">Arctic</text>
  <text x="550" y="240" font-family="sans-serif" font-size="36" font-weight="bold" fill="#0f172a">Workforce</text>
  <text x="550" y="270" font-family="sans-serif" font-size="16" fill="#475569">Connecting Nordic talent</text>
</svg>