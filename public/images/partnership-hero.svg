<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Partnership concept -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="60" fill="white"/>
    <circle cx="200" cy="150" r="60" fill="white"/>
    <circle cx="300" cy="100" r="60" fill="white"/>
    <circle cx="400" cy="150" r="60" fill="white"/>
    <circle cx="500" cy="100" r="60" fill="white"/>
    
    <path d="M160 120L240 140M260 130L340 120M360 130L440 140" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Main content cards -->
  <rect x="50" y="200" width="160" height="120" rx="12" fill="url(#cardGradient)" opacity="0.95"/>
  <rect x="220" y="180" width="160" height="140" rx="12" fill="url(#cardGradient)" opacity="0.95"/>
  <rect x="390" y="200" width="160" height="120" rx="12" fill="url(#cardGradient)" opacity="0.95"/>
  
  <!-- Icons in cards -->
  <!-- Recruitment icon -->
  <circle cx="130" cy="240" r="15" fill="#0ea5e9"/>
  <path d="M122 240C122 235 126 231 130 231C134 231 138 235 138 240C138 244 134 248 130 248C126 248 122 244 122 240Z" fill="white"/>
  <rect x="115" y="252" width="30" height="8" rx="4" fill="#0ea5e9"/>
  <text x="130" y="275" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#0f172a">Recruitment</text>
  
  <!-- Staffing icon -->
  <rect x="285" y="225" width="30" height="20" rx="4" fill="#0ea5e9"/>
  <rect x="290" y="230" width="20" height="2" fill="white"/>
  <rect x="290" y="235" width="15" height="2" fill="white"/>
  <rect x="290" y="240" width="18" height="2" fill="white"/>
  <text x="300" y="265" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#0f172a">Staffing</text>
  
  <!-- Relocation icon -->
  <path d="M455 245L465 235L475 245L470 245V255L460 255V245H455Z" fill="#0ea5e9"/>
  <rect x="450" y="260" width="30" height="4" fill="#67e8f9"/>
  <text x="465" y="275" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#0f172a">Relocation</text>
  
  <!-- Subtle branding -->
  <text x="300" y="50" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="white" opacity="0.9">Arctic Workforce</text>
  <text x="300" y="70" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.7">Building partnerships across the Nordic region</text>
</svg>